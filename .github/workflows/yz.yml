name: Kernel Validation Workflow

on:
  push:
    paths:
      - '.github/workflows/validation.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sdm845
          ref: lineage-21
          submodules: recursive

      - name: Validate Branch
        run: |
          echo "=== Branch Check ==="
          git branch -a | grep -q lineage-21 || {
            echo "❌ Error: lineage-21 branch not found"
            exit 1
          }
          echo "✅ Branch OK"

      - name: Validate Config Path
        run: |
          echo "=== Config Check ==="
          if [ ! -f arch/arm64/configs/perseus_defconfig ]; then
            echo "❌ Error: perseus_defconfig missing"
            echo "Available configs:"
            ls -lR arch/arm64/configs/
            exit 1
          fi
          echo "✅ Config OK"

      - name: Validate Toolchain
        run: |
          echo "=== Toolchain Check ==="
          aarch64-linux-android-14.0-gcc --version || {
            echo "❌ Error: Android 14 toolchain missing"
            exit 1
          }
          echo "✅ Toolchain OK"
