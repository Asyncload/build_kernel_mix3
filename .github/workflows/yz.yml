name: Config File Validation

on:
  push:
    paths:
      - '.github/workflows/config_validation.yml'
  workflow_dispatch:

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sdm845
          ref: lineage-21
          submodules: recursive

      - name: Verify config path
        run: |
          echo "=== Config File Check ==="
          
          # 检查符号链接或实际文件
          if [ ! -f arch/arm64/configs/perseus_defconfig ]; then
            echo "❌ Error: perseus_defconfig not found"
            echo "Available configs in arch/arm64/configs/:"
            ls -l arch/arm64/configs/*.defconfig
            echo "Available configs in vendor/xiaomi/:"
            ls -l arch/arm64/configs/vendor/xiaomi/*.config
            exit 1
          fi
          
          # 验证配置内容
          grep "CONFIG_ANDROID" arch/arm64/configs/perseus_defconfig || {
            echo "❌ Error: Missing Android-related configurations"
            exit 1
          }
          
          echo "✅ Config file validation passed"
