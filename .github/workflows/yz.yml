name: GCC-4.9-路径修复验证

on:
  workflow_dispatch:

jobs:
  verify_gcc:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 下载 GCC (换成 LineageOS 的预编译源)
        run: |
          # 下载 64位 GCC
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git --depth=1 $(pwd)/gcc64
          
          # 下载 32位 GCC
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git --depth=1 $(pwd)/gcc32

      - name: 2. 扫描并验证路径
        run: |
          echo "--- 检查 64位 GCC 目录结构 ---"
          find $(pwd)/gcc64 -name "aarch64-linux-android-gcc"
          
          echo "--- 检查 32位 GCC 目录结构 ---"
          find $(pwd)/gcc32 -name "arm-linux-androideabi-gcc"

      - name: 3. 最终尝试运行
        run: |
          # 自动寻找 bin 目录并运行
          GCC64_EXE=$(find $(pwd)/gcc64 -name "aarch64-linux-android-gcc")
          GCC32_EXE=$(find $(pwd)/gcc32 -name "arm-linux-androideabi-gcc")
          
          if [ -f "$GCC64_EXE" ]; then
            echo "✅ 找到 64位 GCC: $GCC64_EXE"
            $GCC64_EXE --version | head -n 1
          else
            echo "❌ 依然找不到 64位 GCC"
          fi
          
          if [ -f "$GCC32_EXE" ]; then
            echo "✅ 找到 32位 GCC: $GCC32_EXE"
            $GCC32_EXE --version | head -n 1
          fi
