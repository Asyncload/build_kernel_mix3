name: 工具链完整验证-最终版

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 修复 libtinfo5 缺失
        run: |
          wget http://mirrors.kernel.org/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb
          sudo apt install ./libtinfo5_6.3-2_amd64.deb -y

      - name: 2. 安装内核编译基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar bc bison build-essential flex \
            libssl-dev libelf-dev python3 git

      - name: 3. 下载 Proton-Clang
        run: |
          mkdir -p clang-14
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz -C clang-14 --strip-components=1
          echo "CLANG_PATH=$(pwd)/clang-14/bin" >> $GITHUB_ENV

      - name: 4. 下载 GCC (修复路径版本)
        run: |
          # 负责 64 位
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 gcc64
          # 负责 32 位
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 gcc32
          
          echo "GCC64_PATH=$(pwd)/gcc64/bin" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/gcc32/bin" >> $GITHUB_ENV

      - name: 5. 深度验证 (这步过不去不发内核)
        run: |
          echo "--- 检查 Clang ---"
          $CLANG_PATH/clang --version | head -n 1
          
          echo "--- 检查 GCC 64 ---"
          # 尝试直接运行，如果报错会显示具体原因
          $GCC64_PATH/aarch64-linux-android-gcc --version | head -n 1
          
          echo "--- 检查 GCC 32 ---"
          $GCC32_PATH/arm-linux-androideabi-gcc --version | head -n 1

      - name: 6. 环境变量模拟测试
        run: |
          # 模拟内核编译时的 PATH 设置
          export PATH=$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH
          echo "✅ 模拟 PATH 设置成功"
          which clang
          which aarch64-linux-android-gcc
          which arm-linux-androideabi-gcc
