name: Kernel Build Validation

on:
  push:
    paths:
      - '.github/workflows/validation.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sdm845
          ref: lineage-21
          submodules: recursive

      - name: Verify branch
        run: |
          echo "Current branches:"
          git branch -a
          if ! git branch -a | grep -q lineage-21; then
            echo "Error: lineage-21 branch not found"
            exit 1
          fi

      - name: Validate config path
        run: |
          if [ ! -f arch/arm64/configs/perseus_defconfig ]; then
            echo "Error: perseus_defconfig missing"
            echo "Available configs:"
            ls -lR arch/arm64/configs/
            exit 1
          fi

      - name: Check toolchain version
        run: |
          aarch64-linux-android-14.0-gcc --version
          if [ $? -ne 0 ]; then
            echo "Error: Android 14 toolchain not found"
            exit 1
          fi

      - name: Verify environment
        run: |
          echo "ARCH=$ARCH"
          echo "CROSS_COMPILE=$CROSS_COMPILE"
          echo "ANDROID_MAJOR_VERSION=$ANDROID_MAJOR_VERSION"