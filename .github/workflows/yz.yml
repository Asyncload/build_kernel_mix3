name: 工具链完整验证

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  verify:
    runs-on: ubuntu-22.04 # 指定 22.04 更加稳健

    steps:
      - name: 1. 修复 libtinfo5 缺失问题
        run: |
          # Ubuntu 22.04 官方源没这个包，必须手动下载 deb 安装
          wget http://mirrors.kernel.org/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb
          sudo apt install ./libtinfo5_6.3-2_amd64.deb -y

      - name: 2. 安装内核编译基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar bc bison build-essential flex \
            libssl-dev libelf-dev python3 git

      - name: 3. 下载并部署 Proton-Clang (Clang 14)
        run: |
          mkdir -p clang-14
          # 使用 master 分支，这是公认稳定的 Clang 14 内核编译器
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz -C clang-14 --strip-components=1
          
          echo "--- 验证 Clang 版本 ---"
          ./clang-14/bin/clang --version

      - name: 4. 下载并部署 GCC 4.9 (Google 官方)
        run: |
          # 负责 64 位内核主体链接
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 gcc64
          # 负责 32 位兼容层
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 gcc32

      - name: 5. 最终路径与可执行权限验证
        run: |
          echo "✅ 所有工具链已就绪"
          echo "--------------------------------"
          echo "Clang 路径: $(pwd)/clang-14/bin/clang"
          echo "GCC64 路径: $(pwd)/gcc64/bin/aarch64-linux-android-gcc"
          echo "GCC32 路径: $(pwd)/gcc32/bin/arm-linux-androideabi-gcc"
          echo "--------------------------------"
          
          # 执行一次简单的版本交叉验证
          ./clang-14/bin/clang --version | head -n 1
          ./gcc64/bin/aarch64-linux-android-gcc --version | head -n 1
          ./gcc32/bin/arm-linux-androideabi-gcc --version | head -n 1
