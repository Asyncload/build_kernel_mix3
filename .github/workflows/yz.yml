name: GCC-4.9-专项修复验证

on:
  workflow_dispatch:

jobs:
  verify_gcc:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 下载 GCC (Google 官方 AOSP 源)
        run: |
          # 负责 64 位内核主体
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 $(pwd)/gcc64
          # 负责 32 位兼容层 (VDSO等)
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 $(pwd)/gcc32

      - name: 2. 深度扫描路径 (解决找不到文件的问题)
        run: |
          echo "--- 扫描 GCC64 bin 目录 ---"
          ls -F $(pwd)/gcc64/bin/ | grep "gcc"
          
          echo "--- 扫描 GCC32 bin 目录 ---"
          ls -F $(pwd)/gcc32/bin/ | grep "gcc"

      - name: 3. 运行权限修复与执行测试
        run: |
          # 确保有执行权限
          chmod +x $(pwd)/gcc64/bin/*
          chmod +x $(pwd)/gcc32/bin/*
          
          echo "--- 测试 GCC 64 版本 ---"
          $(pwd)/gcc64/bin/aarch64-linux-android-gcc --version
          
          echo "--- 测试 GCC 32 版本 ---"
          $(pwd)/gcc32/bin/arm-linux-androideabi-gcc --version

      - name: 4. 依赖库检查 (关键步骤)
        run: |
          # 有时 GCC 4.9 需要 32 位运行库，或者特定的 libmpfr
          echo "--- 检查 GCC 依赖 ---"
          ldd $(pwd)/gcc64/bin/aarch64-linux-android-gcc || echo "无法使用 ldd 检查"
