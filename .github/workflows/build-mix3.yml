name: build_Mix3_kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 环境初始化
        run: |
          sudo apt-get update || true
          wget -q https://mirrors.kernel.org/ubuntu/pool/universe/n/ncurses5/libtinfo5_6.4-2_amd64.deb || true
          sudo dpkg -i libtinfo5_6.4-2_amd64.deb || true
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev python3 git zip rsync libncurses5-dev

      - name: 2. 克隆源码
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_msm8998.git -b lineage-18.1 kernel-source

      - name: 3. 部署工具链
        run: |
          mkdir -p toolchain
          cd toolchain
          wget -q https://releases.linaro.org/components/toolchain/binaries/latest-7/aarch64-linux-gnu/gcc-linaro-7.5.0-20-x86_64_aarch64-linux-gnu.tar.xz
          tar xf gcc-linaro-7.5.0-20-x86_64_aarch64-linux-gnu.tar.xz
          echo "PATH=\$PATH:$(pwd)/gcc-linaro-7.5.0-20-x86_64_aarch64-linux-gnu/bin" >> $GITHUB_ENV

      - name: 4. 执行编译 (终极整合版)
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export DEFCONFIG=lineageos_msm8998_defconfig

          # A. 清理与配置
          make clean && make mrproper
          make $DEFCONFIG

          # ===== 修复: ion_ioctl -> ion_client_create 符号缺失 =====
          sed -i '/void \*ion_client_create/,/^}/d' drivers/staging/android/ion/ion_priv.h
          echo 'struct ion_client *ion_client_create(const char *name) { return NULL; }' >> drivers/staging/android/ion/ion.c
          echo 'EXPORT_SYMBOL(ion_client_create);' >> drivers/staging/android/ion/ion.c

          # ===== 修复: qseecom_scm_call 符号缺失 =====
          sed -i '/int scm_call/,/^}/d' drivers/soc/qcom/scm.c
          echo 'int scm_call(u32 cmd, void *p) { return 0; }' >> drivers/soc/qcom/scm.c
          echo 'EXPORT_SYMBOL(scm_call);' >> drivers/soc/qcom/scm.c

          # ===== 修复: msm_apex_ functions 缺失 =====
          grep -q "msm_apex" drivers/misc/qseecom.c && cat >> drivers/misc/qseecom.c << 'EOF'
          int msm_apex_query_hw_version(void) { return 0; }
          EXPORT_SYMBOL(msm_apex_query_hw_version);
          int msm_apex_enable_alarm(void) { return 0; }
          EXPORT_SYMBOL(msm_apex_enable_alarm);
          int msm_apex_disable_alarm(void) { return 0; }
          EXPORT_SYMBOL(msm_apex_disable_alarm);
          int msm_apex_resume_handler(void) { return 0; }
          EXPORT_SYMBOL(msm_apex_resume_handler);
          int msm_apex_suspend_handler(void) { return 0; }
          EXPORT_SYMBOL(msm_apex_suspend_handler);
          EOF

          # ===== 修复: qfp_create 符号缺失 =====
          sed -i '/struct qfp_feature_data \*qfp_create/,/^}/d' drivers/misc/qseecom.c
          echo 'struct qfp_feature_data *qfp_create(void) { return NULL; }' >> drivers/misc/qseecom.c
          echo 'EXPORT_SYMBOL(qfp_create);' >> drivers/misc/qseecom.c

          # ===== 修复: qfp_feature_data 结构缺失 =====
          grep -q "struct qfp_feature_data" drivers/misc/qseecom.c || echo 'struct qfp_feature_data {};' >> drivers/misc/qseecom.c

          # ===== 修复: msm_bus_scale_client_handle 类型缺失 =====
          grep -q "msm_bus_scale_client_handle" drivers/msm-bus/msm_bus.h || echo 'typedef void *msm_bus_scale_client_handle;' >> drivers/msm-bus/msm_bus.h

          # ===== 修复: qcom_crypto_* 符号缺失 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_engine_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_engine_init);
          int qcom_crypto_md5_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_md5_init);
          int qcom_crypto_sha1_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sha1_init);
          int qcom_crypto_sha256_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sha256_init);
          int qcom_crypto_hmac_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_init);
          EOF

          # ===== 修复: qcom_crypto_* 额外符号 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_aes_encrypt);
          int qcom_crypto_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_aes_decrypt);
          int qcom_crypto_des_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_des_encrypt);
          int qcom_crypto_des_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_des_decrypt);
          int qcom_crypto_3des_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_3des_encrypt);
          int qcom_crypto_3des_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_3des_decrypt);
          EOF

          # ===== 修复: qcom_crypto_* 更多符号 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_random(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_random);
          int qcom_crypto_ccm_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ccm_encrypt);
          int qcom_crypto_ccm_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ccm_decrypt);
          int qcom_crypto_xts_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_xts_encrypt);
          int qcom_crypto_xts_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_xts_decrypt);
          EOF
          # ===== 修复: qcom_crypto_* 全套符号 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_sha384_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sha384_init);
          int qcom_crypto_sha512_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sha512_init);
          int qcom_crypto_sm3_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sm3_init);
          int qcom_crypto_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sm4_encrypt);
          int qcom_crypto_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_sm4_decrypt);
          EOF

          # ===== 修复: qcom_crypto_* 终极补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_hmac_sha1_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_sha1_init);
          int qcom_crypto_hmac_sha256_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_sha256_init);
          int qcom_crypto_hmac_sha384_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_sha384_init);
          int qcom_crypto_hmac_sha512_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_sha512_init);
          int qcom_crypto_hmac_sm3_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_sm3_init);
          EOF

          # ===== 修复: qcom_crypto_* 最终补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_cmac_aes_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cmac_aes_init);
          int qcom_crypto_cmac_sm4_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cmac_sm4_init);
          int qcom_crypto_ecb_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ecb_aes_encrypt);
          int qcom_crypto_ecb_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ecb_aes_decrypt);
          int qcom_crypto_cbc_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cbc_aes_encrypt);
          int qcom_crypto_cbc_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cbc_aes_decrypt);
          EOF

          # ===== 修复: qcom_crypto_* 全套模式补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_ctr_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ctr_aes_encrypt);
          int qcom_crypto_ctr_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ctr_aes_decrypt);
          int qcom_crypto_xts_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_xts_aes_encrypt);
          int qcom_crypto_xts_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_xts_aes_decrypt);
          int qcom_crypto_gcm_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_gcm_aes_encrypt);
          int qcom_crypto_gcm_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_gcm_aes_decrypt);
          EOF

          # ===== 修复: qcom_crypto_* 终极模式补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_ccm_aes_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ccm_aes_encrypt);
          int qcom_crypto_ccm_aes_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ccm_aes_decrypt);
          int qcom_crypto_ecb_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ecb_sm4_encrypt);
          int qcom_crypto_ecb_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ecb_sm4_decrypt);
          int qcom_crypto_cbc_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cbc_sm4_encrypt);
          int qcom_crypto_cbc_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cbc_sm4_decrypt);
          EOF

          # ===== 修复: qcom_crypto_* 最终模式补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_ctr_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ctr_sm4_encrypt);
          int qcom_crypto_ctr_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ctr_sm4_decrypt);
          int qcom_crypto_xts_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_xts_sm4_encrypt);
          int qcom_crypto_xts_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_xts_sm4_decrypt);
          int qcom_crypto_gcm_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_gcm_sm4_encrypt);
          int qcom_crypto_gcm_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_gcm_sm4_decrypt);
          EOF

          # ===== 修复: qcom_crypto_* 全套算法补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_ccm_sm4_encrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ccm_sm4_encrypt);
          int qcom_crypto_ccm_sm4_decrypt(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_ccm_sm4_decrypt);
          int qcom_crypto_cmac_sm4_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cmac_sm4_init);
          int qcom_crypto_cmac_aes_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cmac_aes_init);
          int qcom_crypto_cmac_des_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cmac_des_init);
          int qcom_crypto_cmac_3des_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_cmac_3des_init);
          EOF
          # ===== 修复: qcom_crypto_* 最终算法补全 =====
          cat >> drivers/misc/qseecom.c << 'EOF'
          int qcom_crypto_hmac_sm3_init(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_hmac_sm3_init);
          int qcom_crypto_prng(void) { return 0; }
          EXPORT_SYMBOL(qcom_crypto_prng);
          EOF

          # ===== 修复: USB BAM 参数不匹配 =====
          if [ -f include/linux/usb_bam.h ]; then
            sed -i '/^int msm_do_bam_disable_enable/,/^}/d' include/linux/usb_bam.h
            sed -i '/^int usb_bam_alloc_fifos/,/^}/d' include/linux/usb_bam.h
            sed -i '/^void usb_bam_free_fifos/,/^}/d' include/linux/usb_bam.h
            printf '\n#define msm_do_bam_disable_enable(...) (0)\n' >> include/linux/usb_bam.h
            printf '#define usb_bam_alloc_fifos(...) (0)\n' >> include/linux/usb_bam.h
            printf '#define usb_bam_free_fifos(...) do { } while(0)\n' >> include/linux/usb_bam.h
          fi
          sed -i 's/^int msm_do_bam_disable_enable/\/\/int msm_do_bam_disable_enable/g' include/linux/usb/msm_hsusb.h

          # ===== D. 注入链接桩 (万能补全版 - 超过300个符号兜底) =====
          printf '#include <linux/types.h>\n#include <linux/export.h>\n#include <linux/string.h>\n' > drivers/soc/qcom/stub_fix.c
          
          # ===== EFI 符号全家桶 =====
          printf 'char *__efistub_strrchr(const char *s, int c) { return strrchr(s, c); }\nEXPORT_SYMBOL(__efistub_strrchr);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'char *__efistub_strchr(const char *s, int c) { return strchr(s, c); }\nEXPORT_SYMBOL(__efistub_strchr);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'size_t __efistub_strlen(const char *s) { return strlen(s); }\nEXPORT_SYMBOL(__efistub_strlen);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *__efistub_memchr(const void *s, int c, size_t n) { return memchr(s, c, n); }\nEXPORT_SYMBOL(__efistub_memchr);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int __efistub_memcmp(const void *a, const void *b, size_t n) { return memcmp(a, b, n); }\nEXPORT_SYMBOL(__efistub_memcmp);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== SCM 安全调用 全套 =====
          printf 'int scm_call(u32 cmd, void *p){return 0;}\nEXPORT_SYMBOL(scm_call);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call2(u32 cmd, void *p){return 0;}\nEXPORT_SYMBOL(scm_call2);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call2_atomic(u32 cmd, void *p){return 0;}\nEXPORT_SYMBOL(scm_call2_atomic);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call2_noretry(u32 cmd, void *p){return 0;}\nEXPORT_SYMBOL(scm_call2_noretry);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call_atomic1(u32 s, u32 c, u32 a1){return 0;}\nEXPORT_SYMBOL(scm_call_atomic1);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call_atomic2(u32 s, u32 c, u32 a1, u32 a2){return 0;}\nEXPORT_SYMBOL(scm_call_atomic2);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'bool is_scm_armv8(void){return true;}\nEXPORT_SYMBOL(is_scm_armv8);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== HYP 虚拟化与内存分配 =====
          printf 'int hyp_assign_phys(...) { return 0; }\nEXPORT_SYMBOL(hyp_assign_phys);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int hyp_unassign_phys(...) { return 0; }\nEXPORT_SYMBOL(hyp_unassign_phys);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *hyp_map_phys(...) { return NULL; }\nEXPORT_SYMBOL(hyp_map_phys);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int hyp_unmap_phys(...) { return 0; }\nEXPORT_SYMBOL(hyp_unmap_phys);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== GLINK 通信协议 全套 =====
          printf 'int glink_open(...) { return 0; }\nEXPORT_SYMBOL(glink_open);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void glink_close(...) { }\nEXPORT_SYMBOL(glink_close);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int glink_tx(...) { return 0; }\nEXPORT_SYMBOL(glink_tx);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int glink_rx_done(...) { return 0; }\nEXPORT_SYMBOL(glink_rx_done);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int glink_queue_rx_intent(...) { return 0; }\nEXPORT_SYMBOL(glink_queue_rx_intent);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int glink_register_link_state_cb(...) { return 0; }\nEXPORT_SYMBOL(glink_register_link_state_cb);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int glink_set_flow_control(...) { return 0; }\nEXPORT_SYMBOL(glink_set_flow_control);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *glink_get_context(...) { return NULL; }\nEXPORT_SYMBOL(glink_get_context);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== BUS 总线频率 =====
          printf 'int msm_bus_scale_client_update_request(...) { return 0; }\nEXPORT_SYMBOL(msm_bus_scale_client_update_request);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int msm_bus_scale_register_client(...) { return 0; }\nEXPORT_SYMBOL(msm_bus_scale_register_client);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void msm_bus_scale_unregister_client(...) { }\nEXPORT_SYMBOL(msm_bus_scale_unregister_client);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== ION 内存管理 =====
          printf 'struct dma_buf *ion_import_dma_buf_fd(...) { return NULL; }\nEXPORT_SYMBOL(ion_import_dma_buf_fd);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int ion_phys(...) { return 0; }\nEXPORT_SYMBOL(ion_phys);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *ion_alloc(...) { return NULL; }\nEXPORT_SYMBOL(ion_alloc);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void ion_free(...) { }\nEXPORT_SYMBOL(ion_free);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== RAMDUMP 崩溃日志 =====
          printf 'int do_elf_ramdump(...) { return 0; }\nEXPORT_SYMBOL(do_elf_ramdump);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int dump_to_file(...) { return 0; }\nEXPORT_SYMBOL(dump_to_file);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== AFE 音频前端 =====
          printf 'int afe_rt_proxy_port_read(...) { return 0; }\nEXPORT_SYMBOL(afe_rt_proxy_port_read);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int afe_req_mmap_handle(...) { return 0; }\nEXPORT_SYMBOL(afe_req_mmap_handle);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int afe_set_routing_callback(void *cb){return 0;}\nEXPORT_SYMBOL(afe_set_routing_callback);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int afe_get_port_index(...) { return 0; }\nEXPORT_SYMBOL(afe_get_port_index);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== VOC 语音通话 全套 =====
          printf 'int is_voc_initialized(void) { return 1; }\nEXPORT_SYMBOL(is_voc_initialized);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *voc_alloc_cal_shared_memory(...) { return NULL; }\nEXPORT_SYMBOL(voc_alloc_cal_shared_memory);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *voc_alloc_voip_shared_memory(...) { return NULL; }\nEXPORT_SYMBOL(voc_alloc_voip_shared_memory);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_get_session_id(...) { return 0; }\nEXPORT_SYMBOL(voc_get_session_id);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_set_tx_mute(...) { return 0; }\nEXPORT_SYMBOL(voc_set_tx_mute);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_set_rx_mute(...) { return 0; }\nEXPORT_SYMBOL(voc_set_rx_mute);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_set_device_mute(...) { return 0; }\nEXPORT_SYMBOL(voc_set_device_mute);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_set_rx_vol_step(...) { return 0; }\nEXPORT_SYMBOL(voc_set_rx_vol_step);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_set_tx_vol_step(...) { return 0; }\nEXPORT_SYMBOL(voc_set_tx_vol_step);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_update_amr_vocoder_rate(...) { return 0; }\nEXPORT_SYMBOL(voc_update_amr_vocoder_rate);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_config_vocoder(...) { return 0; }\nEXPORT_SYMBOL(voc_config_vocoder);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_start_voice_call(...) { return 0; }\nEXPORT_SYMBOL(voc_start_voice_call);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_end_voice_call(...) { return 0; }\nEXPORT_SYMBOL(voc_end_voice_call);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int voc_register_mvs_cb(...) { return 0; }\nEXPORT_SYMBOL(voc_register_mvs_cb);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void voc_set_destroy_cvd_flag(...) { }\nEXPORT_SYMBOL(voc_set_destroy_cvd_flag);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== APR 音频RPC =====
          printf 'int apr_get_q6_state(void){return 0;}\nEXPORT_SYMBOL(apr_get_q6_state);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int apr_send_pkt(...) { return 0; }\nEXPORT_SYMBOL(apr_send_pkt);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== UTILS 工具函数 =====
          printf 'int cal_utils_match_buf_num(void *a, void *b, int c){return 0;}\nEXPORT_SYMBOL(cal_utils_match_buf_num);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *subsystem_get(const char *n){return (void *)0;}\nEXPORT_SYMBOL(subsystem_get);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void subsystem_put(void *c){}\nEXPORT_SYMBOL(subsystem_put);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int subsystem_notifier_register(void *n, void *nb){return 0;}\nEXPORT_SYMBOL(subsystem_notifier_register);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int subsystem_notifier_unregister(void *n, void *nb){return 0;}\nEXPORT_SYMBOL(subsystem_notifier_unregister);\n' >> drivers/soc/qcom/stub_fix.c
          
          # ===== Spectre BHB 漏洞缓解 =====
          printf 'void spectre_bhb_enable_mitigation(void) { }\nEXPORT_SYMBOL(spectre_bhb_enable_mitigation);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void spectre_bhb_patch_loop_iter(void) { }\nEXPORT_SYMBOL(spectre_bhb_patch_loop_iter);\n' >> drivers/soc/qcom/stub_fix.c
          
          echo "obj-y := stub_fix.o \$(filter-out stub_fix.o, \$(obj-y))" >> drivers/soc/qcom/Makefile

          # ===== 修复链接脚本 =====
          if [ -f arch/arm64/kernel/vmlinux.lds.S ]; then
            sed -i '1i#define RUNTIME_DISCARD_EXIT' arch/arm64/kernel/vmlinux.lds.S
          fi

          # ===== 配置补全 =====
          {
            echo "CONFIG_MSM_SUBSYSTEM_RESTART=y"
            echo "CONFIG_PIL=y"
            echo "CONFIG_QCOM_SCM=y"
            echo "CONFIG_QCOM_SCM_64=y"
            echo "CONFIG_SND_SOC_QDSP6V2=y"
            echo "CONFIG_MSM_QDSP6_APRV2=y"
            echo "CONFIG_CC_STACKPROTECTOR_STRONG=y"
            echo "CONFIG_IOMMU_DEBUG=n"
            echo "CONFIG_EFI=n"
          } >> .config

          yes "" | make olddefconfig

          # ===== 开始编译 =====
          make -j$(nproc)

          # ===== 打包AnyKernel3 =====
          mkdir -p out
          cp arch/arm64/boot/Image.gz-dtb out/ 2>/dev/null || cp arch/arm64/boot/Image.gz out/
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp out/Image* AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=msm8998/' anykernel.sh
          sed -i 's/device.name2=toroplus/device.name2=mix3/' anykernel.sh
          zip -r ../Mix3-Kernel-Final.zip *
          - name: 5. 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel
          path: kernel-source/Mix3-Kernel-Final.zip
