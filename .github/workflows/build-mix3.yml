name: build_Mix3_kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 安装构建包
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf \
            lib32readline-dev lib32z1-dev libdw-dev libelf-dev libgnutls28-dev \
            lz4 libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 libtinfo5 libncurses5

      - name: 克隆内核源码
        run: |
          # 内核源码在 GitHub 是公开的，可以直接拉取
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 下载工具链 (强制使用 Google 官方公开源)
        run: |
          # 彻底弃用 github.com 链接，改用无需登录的 Google 源
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 --depth=1 clang
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 gcc64
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 gcc32

      - name: 执行编译 (全智能路径版)
        run: |
          cd kernel-source
          
          # 自动寻回 bin 目录
          CLANG_BIN=$(find $GITHUB_WORKSPACE/clang -name "clang" -type f | xargs dirname | head -n 1)
          GCC64_BIN=$(find $GITHUB_WORKSPACE/gcc64 -name "aarch64-linux-android-gcc" -type f | xargs dirname | head -n 1)
          GCC32_BIN=$(find $GITHUB_WORKSPACE/gcc32 -name "arm-linux-androideabi-gcc" -type f | xargs dirname | head -n 1)
          
          echo "Found Clang at: $CLANG_BIN"
          echo "Found GCC64 at: $GCC64_BIN"
          echo "Found GCC32 at: $GCC32_BIN"
          
          export PATH=$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          mkdir -p out
          # 使用通用的 sdm845 配置
          make O=out sdm845_defconfig
          
          # 合并小米 Mix 3 专用配置 (如果文件存在)
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            ARCH=arm64 scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi
          
          # 开始正式编译
          make -j$(nproc --all) O=out \
                        CC=clang \
                        CLANG_TRIPLE=aarch64-linux-gnu- \
                        CROSS_COMPILE=aarch64-linux-android- \
                        CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                        LD=ld.lld \
                        AR=llvm-ar \
                        NM=llvm-nm \
                        OBJCOPY=llvm-objcopy \
                        OBJDUMP=llvm-objdump \
                        STRIP=llvm-strip

      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
              cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
              cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          else
              cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/
          fi
          
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=mix3/' anykernel.sh
          zip -r ../Mix3-Kernel.zip *

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-L21-Kernel
          path: Mix3-Kernel.zip
