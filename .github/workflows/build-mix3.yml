name: build_Mix3_kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 环境初始化
        run: |
          sudo apt-get update
          wget -q http://mirrors.kernel.org/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb
          sudo apt install ./libtinfo5_6.3-2_amd64.deb -y
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev python3 git zip rsync libncurses5

      - name: 2. 克隆源码 (Lineage-21)
        run: |
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 3. 部署工具链 (Proton Clang + GCC)
        run: |
          mkdir -p $(pwd)/toolchain/clang
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz -C $(pwd)/toolchain/clang --strip-components=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git --depth=1 $(pwd)/toolchain/gcc64
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git --depth=1 $(pwd)/toolchain/gcc32
          echo "CLANG_PATH=$(pwd)/toolchain/clang/bin" >> $GITHUB_ENV
          echo "GCC64_PATH=$(pwd)/toolchain/gcc64/bin" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/toolchain/gcc32/bin" >> $GITHUB_ENV

      - name: 4. 执行核心编译 (全功能强连·终极版)
        run: |
          cd kernel-source
          export PATH=$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH
          
          # A. 生成基础配置
          make O=out ARCH=arm64 CC=clang sdm845_defconfig
          
          # B. 合并小米专用配置 (Perseus)
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi

          # C. 预处理：消除模块化干扰，强行锁定音频底层驱动为内置 (Built-in)
          sed -i 's/=m/=y/g' out/.config
          echo "CONFIG_EFI=n" >> out/.config
          echo "CONFIG_MSM_APR=y" >> out/.config
          echo "CONFIG_MSM_QDSP6_APRV2=y" >> out/.config
          
          # D. 刷新配置并自动处理依赖
          yes "" | make O=out ARCH=arm64 CC=clang olddefconfig

          # E. 执行强连编译：通过 KCFLAGS 强制引导头文件路径，解决 Techpack 符号断裂
          make -j$(nproc --all) O=out \
                        ARCH=arm64 \
                        CC=clang \
                        CLANG_TRIPLE=aarch64-linux-gnu- \
                        CROSS_COMPILE=aarch64-linux-android- \
                        CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                        AR=llvm-ar \
                        NM=llvm-nm \
                        OBJCOPY=llvm-objcopy \
                        OBJDUMP=llvm-objdump \
                        STRIP=llvm-strip \
                        CONFIG_MSM_APR=y \
                        CONFIG_MSM_QDSP6_APRV2=y \
                        CONFIG_SND_SOC_QDSP6V2=y \
                        TECHPACK_AUDIO=y \
                        KCFLAGS="-I$(pwd)/drivers/soc/qcom -I$(pwd)/drivers/soc/qcom/qdsp6v2 -DCONFIG_MSM_APR=1 -DCONFIG_MSM_QDSP6_APRV2=1" \
                        USER_EXT_CONFIG=techpack/audio/config/sdm845.conf \
                        V=0

      - name: 5. 打包 AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          # 注意：产物在 out 目录下
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          fi
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
          sed -i 's/device.name2=toroplus/device.name2=mix3/' anykernel.sh
          zip -r ../Mix3-Kernel-Result.zip *

      - name: 6. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel-Final
          path: Mix3-Kernel-Result.zip
