name: build_Mix3_kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 安装构建包
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf \
            lib32readline-dev lib32z1-dev libdw-dev libelf-dev libgnutls28-dev \
            lz4 libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 libtinfo5 libncurses5

      - name: 克隆内核源码
        run: |
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 缓存工具链
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            clang
            gcc64
            gcc32
          key: toolchain-sdm845-clang12-v1

      - name: 下载工具链 (锁定 Clang 12 黄金版本)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          # 锁定 AOSP 官方 Clang 12 (r416183b)
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 --depth=1 -b busytown-clang-r416183b clang
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 gcc64
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 gcc32

      - name: 执行核心编译 (Clang 12 适配版)
        run: |
          cd kernel-source
          
          # 1. 精准路径定位
          CLANG_BIN=$(find $GITHUB_WORKSPACE/clang -name "clang" -type f | xargs dirname | grep "bin" | head -n 1)
          GCC64_BIN=$GITHUB_WORKSPACE/gcc64/bin
          GCC32_BIN=$GITHUB_WORKSPACE/gcc32/bin
          
          # 2. 环境变量强制注入
          export PATH=$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export HOSTCC=gcc
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          mkdir -p out
          
          # 3. 生成配置 (锁定 CC=clang 绕过检查)
          make O=out ARCH=arm64 CC=clang sdm845_defconfig
          
          # 4. 合并小米 Mix 3 专用配置
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            ARCH=arm64 CC=clang scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi
          
          # 5. 【暴力防雷】在 Clang 12 下直接写死堆栈保护配置，防止 Makefile 逻辑抽风
          echo "CONFIG_CC_STACKPROTECTOR_STRONG=y" >> out/.config
          
          # 6. 同步配置 (使用 olddefconfig 自动补全)
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- olddefconfig

          # 7. 全量编译 (Clang 12 环境)
          # 注意：LD=ld.lld 在 Clang 12 中非常稳定
          make -j$(nproc --all) O=out \
                        ARCH=arm64 \
                        CC=clang \
                        CLANG_TRIPLE=aarch64-linux-gnu- \
                        CROSS_COMPILE=aarch64-linux-android- \
                        CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                        LD=ld.lld \
                        AR=llvm-ar \
                        NM=llvm-nm \
                        OBJCOPY=llvm-objcopy \
                        OBJDUMP=llvm-objdump \
                        STRIP=llvm-strip

      - name: 打包直刷包
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          # 智能匹配生成的镜像文件
          [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ] && cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          [ -f kernel-source/out/arch/arm64/boot/Image.gz ] && cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
          zip -r ../Mix3-L21-Kernel.zip *

      - name: 上传产出物
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel-Clang12
          path: Mix3-L21-Kernel.zip
