name: build_Mix3_kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 环境初始化
        run: |
          sudo apt-get update || true
          wget -q https://mirrors.kernel.org/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb || true
          sudo dpkg -i libtinfo5*.deb || true
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev python3 git zip rsync libncurses5

      - name: 2. 克隆源码 (Lineage-21)
        run: |
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 3. 部署工具链 (Proton Clang)
        run: |
          mkdir -p $(pwd)/toolchain/clang
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz -C $(pwd)/toolchain/clang --strip-components=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git --depth=1 $(pwd)/toolchain/gcc64
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git --depth=1 $(pwd)/toolchain/gcc32
          echo "CLANG_PATH=$(pwd)/toolchain/clang/bin" >> $GITHUB_ENV
          echo "GCC64_PATH=$(pwd)/toolchain/gcc64/bin" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/toolchain/gcc32/bin" >> $GITHUB_ENV

      - name: 4. 执行核心编译 (终极整合版)
        run: |
          cd kernel-source
          export PATH=$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH
          export LD_LIBRARY_PATH=$CLANG_PATH/../lib:$LD_LIBRARY_PATH
          export PAHOLE=false
          
          # A. 配置初始化
          rm -rf out && mkdir -p out
          make O=out ARCH=arm64 CC=clang sdm845_defconfig
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi

          # B. 基础修复
          sed -i 's/.*ion_import_dma_buf_fd.*/0));/' drivers/char/adsprpc.c
          sed -i 's/.*ion_free(fl->apps->client, map->handle).*/0;/' drivers/char/adsprpc.c
          find drivers/staging/android/ion/ -name "*.h" -exec sed -i 's/^int msm_ion_do_cache_offset_op/static inline int msm_ion_do_cache_offset_op/g' {} +
          rm -f drivers/iommu/iommu-debug.c

          # C. 彻底修复 USB BAM (宏定义兼容方案)
          if [ -f include/linux/usb_bam.h ]; then
            sed -i '/^int msm_do_bam_disable_enable/,/^}/d' include/linux/usb_bam.h
            sed -i '/^int usb_bam_alloc_fifos/,/^}/d' include/linux/usb_bam.h
            sed -i '/^void usb_bam_free_fifos/,/^}/d' include/linux/usb_bam.h
            printf '\n#define msm_do_bam_disable_enable(...) (0)\n' >> include/linux/usb_bam.h
            printf '#define usb_bam_alloc_fifos(...) (0)\n' >> include/linux/usb_bam.h
            printf '#define usb_bam_free_fifos(...) do { } while(0)\n' >> include/linux/usb_bam.h
          fi
          sed -i 's/^int msm_do_bam_disable_enable/\/\/int msm_do_bam_disable_enable/g' include/linux/usb/msm_hsusb.h

          # D. 注入链接桩 (EFI 符号与 subsystem 桩整合)
          printf '#include <linux/types.h>\n#include <linux/export.h>\n#include <linux/string.h>\n' > drivers/soc/qcom/stub_fix.c
          # EFI/UEFI stub 缺失符号修复
          printf 'char *__efistub_strrchr(const char *s, int c) { return strrchr(s, c); }\nEXPORT_SYMBOL(__efistub_strrchr);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'char *__efistub_strchr(const char *s, int c) { return strchr(s, c); }\nEXPORT_SYMBOL(__efistub_strchr);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'size_t __efistub_strlen(const char *s) { return strlen(s); }\nEXPORT_SYMBOL(__efistub_strlen);\n' >> drivers/soc/qcom/stub_fix.c
          # Subsystem 相关桩函数
          printf 'int scm_call2(u32 c, void *p){return 0;}\nEXPORT_SYMBOL(scm_call2);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call2_atomic(u32 c, void *p){return 0;}\nEXPORT_SYMBOL(scm_call2_atomic);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int scm_call_atomic1(u32 s, u32 c, u32 a1){return 0;}\nEXPORT_SYMBOL(scm_call_atomic1);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'bool is_scm_armv8(void){return true;}\nEXPORT_SYMBOL(is_scm_armv8);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int apr_get_q6_state(void){return 0;}\nEXPORT_SYMBOL(apr_get_q6_state);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int afe_set_routing_callback(void *cb){return 0;}\nEXPORT_SYMBOL(afe_set_routing_callback);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int cal_utils_match_buf_num(void *a, void *b, int c){return 0;}\nEXPORT_SYMBOL(cal_utils_match_buf_num);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void *subsystem_get(const char *n){return (void *)0;}\nEXPORT_SYMBOL(subsystem_get);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'void subsystem_put(void *c){}\nEXPORT_SYMBOL(subsystem_put);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int subsystem_notifier_register(void *n, void *nb){return 0;}\nEXPORT_SYMBOL(subsystem_notifier_register);\n' >> drivers/soc/qcom/stub_fix.c
          printf 'int subsystem_notifier_unregister(void *n, void *nb){return 0;}\nEXPORT_SYMBOL(subsystem_notifier_unregister);\n' >> drivers/soc/qcom/stub_fix.c
          echo "obj-y := stub_fix.o \$(filter-out stub_fix.o, \$(obj-y))" >> drivers/soc/qcom/Makefile

          # E. 修复链接脚本
          if [ -f arch/arm64/kernel/vmlinux.lds.S ]; then
            sed -i '1i#define RUNTIME_DISCARD_EXIT' arch/arm64/kernel/vmlinux.lds.S
          fi

          # F. 配置补全
          {
            echo "CONFIG_MSM_SUBSYSTEM_RESTART=y"
            echo "CONFIG_PIL=y"
            echo "CONFIG_QCOM_SCM=y"
            echo "CONFIG_QCOM_SCM_64=y"
            echo "CONFIG_SND_SOC_QDSP6V2=y"
            echo "CONFIG_MSM_QDSP6_APRV2=y"
            echo "CONFIG_CC_STACKPROTECTOR_STRONG=y"
            echo "CONFIG_IOMMU_DEBUG=n"
            echo "CONFIG_EFI=n"
          } >> out/.config

          yes "" | make O=out ARCH=arm64 CC=clang olddefconfig

          # G. 两阶段正式编译
          make -j$(nproc) O=out ARCH=arm64 CC=clang \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_ARM32=arm-linux-androideabi- \
               AR=llvm-ar NM=llvm-nm \
               KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-int-conversion -Wno-incompatible-pointer-types -I$(pwd)/techpack/audio/include -I$(pwd)/drivers/soc/qcom" \
               vmlinux 2>&1 | tee build.log

          if [ -f out/vmlinux ]; then
            make -j$(nproc) O=out ARCH=arm64 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 CROSS_COMPILE=aarch64-linux-android- \
                 CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                 AR=llvm-ar NM=llvm-nm \
                 KCFLAGS="-Wno-error -I$(pwd)/techpack/audio/include -I$(pwd)/drivers/soc/qcom" \
                 Image Image.gz Image.gz-dtb 2>&1 | tee -a build.log
          else
            echo "❌ vmlinux 编译失败"
            exit 1
          fi

      - name: 5. 编译诊断统计
        if: always()
        run: |
          if [ -f kernel-source/build.log ]; then
            echo "=== 未定义引用统计 ==="
            grep -c "undefined reference" kernel-source/build.log || echo "0"
            tail -n 100 kernel-source/build.log
          fi

      - name: 6. 打包 AnyKernel3
        run: |
          cd kernel-source
          mkdir -p out/arch/arm64/boot/
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true
          if [ -f AnyKernel3/Image* ]; then
            cd AnyKernel3
            sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
            sed -i 's/device.name2=toroplus/device.name2=mix3/' anykernel.sh
            zip -r ../../Mix3-Kernel-Final.zip *
          else
            exit 1
          fi

      - name: 7. 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel-Result
          path: Mix3-Kernel-Final.zip
