name: LineageOS 21 Kernel Build for Mix3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
        - name: 安装构建包
      run: |
        # 换成更快的镜像源（比如阿里云或腾讯云，GitHub 访问这些也很快）
        sudo sed -i 's/archive.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
        sudo apt-get update -qq
        # 加上 --no-install-recommends 只装核心，不装杂七杂八的推荐包
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf \
          lib32readline-dev lib32z1-dev libdw-dev libelf-dev libgnutls28-dev \
          lz4 libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
          rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python-is-python3 libtinfo5 libncurses5


    - name: 克隆内核源码
      run: |
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

    - name: 下载工具链 (使用第三方稳定镜像源)
      run: |
        # 使用专门为内核编译提供的 Clang 镜像源 (Eva Clang)
        mkdir -p clang
        curl -Ls https://github.com/mvaisakh/gcc-arm64/releases/download/v15.0.0/clang-r487747c.tar.gz -o clang.tar.gz
        # 如果下载失败则退出，防止产生假文件
        [ -s clang.tar.gz ] || exit 1
        tar -xf clang.tar.gz -C clang
        
        # 使用完全公开的 GCC 4.9 镜像
        git clone https://github.com/mvaisakh/gcc-arm64.git --depth=1 gcc64
        git clone https://github.com/mvaisakh/gcc-arm.git --depth=1 gcc32

    - name: 配置版本号
      run: |
        cd kernel-source
        fixed_version="LineageOS-21-Dola"
        sed -i "s/^EXTRAVERSION =.*/EXTRAVERSION = -${fixed_version}/" Makefile
        echo "CONFIG_LOCALVERSION=\"-${fixed_version}\"" >> arch/arm64/configs/vendor/xiaomi/perseus.config

    - name: 执行编译
      run: |
        cd kernel-source
        # 修正路径：mvaisakh 的 clang 内部可能有嵌套文件夹
        export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
        export ARCH=arm64
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        
        mkdir -p out
        make O=out mi845_defconfig
        ARCH=arm64 scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
        
        make -j$(nproc --all) O=out \
                      CC=clang \
                      CLANG_TRIPLE=aarch64-linux-gnu- \
                      CROSS_COMPILE=aarch64-linux-android- \
                      CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                      LD=ld.lld \
                      AR=llvm-ar \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip

    - name: 打包 AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git
        if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        else
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
        fi
        cd AnyKernel3
        sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
        sed -i 's/device.name2=toro/device.name2=mix3/' anykernel.sh
        zip -r ../Mix3-Kernel-Flashable.zip *

    - name: 上传
      uses: actions/upload-artifact@v4
      with:
        name: Mix3-L21-Kernel
        path: Mix3-Kernel-Flashable.zip
