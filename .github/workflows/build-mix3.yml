name: build_Mix3_kernel

on:
  push:
    branches: [ "" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 安装基础构建依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf lib32readline-dev lib32z1-dev libelf-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 libtinfo5 libncurses5

      - name: 克隆内核源码
        run: |
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 下载工具链 (模糊匹配 Clang 14)
        run: |
          # 1. 直接克隆 main-kernel 分支，使用过滤器加快速度
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b main-kernel --depth=1 --filter=blob:none clang-toolchain
          
          cd clang-toolchain
          # 2. 自动寻找以 clang-r450784 开头的实际文件夹（处理后缀变动）
          REAL_CLANG_DIR=$(ls -d clang-r450784* | head -n 1)
          
          if [ -z "$REAL_CLANG_DIR" ]; then
            echo "❌ 找不到 Clang 14 目录，当前目录下的候选版本有："
            ls -d clang-r*
            exit 1
          fi
          
          echo "✅ 锁定工具链目录: $REAL_CLANG_DIR"
          
          # 3. 验证并存储绝对路径
          if [ -f "$REAL_CLANG_DIR/bin/clang" ]; then
            ./$REAL_CLANG_DIR/bin/clang --version
            echo "FINAL_CLANG_PATH=$(pwd)/$REAL_CLANG_DIR/bin" >> $GITHUB_ENV
          else
            echo "❌ 找到目录但 bin/clang 不存在"
            exit 1
          fi
          cd ..

          # 4. 下载辅助 GCC 4.9
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 --depth=1 gcc64
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 --depth=1 gcc32

      - name: 执行核心编译
        run: |
          # 1. 环境变量注入
          export PATH=$FINAL_CLANG_PATH:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export HOSTCC=gcc
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          echo "Current Path: $PATH"
          
          cd kernel-source
          mkdir -p out
          
          # 2. 生成配置
          make O=out ARCH=arm64 CC=clang sdm845_defconfig
          
          # 3. 合并小米 Mix 3 (perseus) 专用配置
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi
          
          # 4. 刷新配置
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- olddefconfig

          # 5. 全量编译
          make -j$(nproc --all) O=out \
                        ARCH=arm64 \
                        CC=clang \
                        CLANG_TRIPLE=aarch64-linux-gnu- \
                        CROSS_COMPILE=aarch64-linux-android- \
                        CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                        LD=ld.lld \
                        AR=llvm-ar \
                        NM=llvm-nm \
                        OBJCOPY=llvm-objcopy \
                        OBJDUMP=llvm-objdump \
                        STRIP=llvm-strip

      - name: 打包直刷包 (AnyKernel3)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          fi
          
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
          zip -r ../Mix3-Kernel-Clang14.zip *

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel-Result
          path: Mix3-Kernel-Clang14.zip
