name: build_Mix3_kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1. 环境初始化 (免更新高容错版)
        run: |
          # 跳过不稳定的 apt-get update
          wget -q https://mirrors.kernel.org/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb || \
          wget -q http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb
          
          sudo dpkg -i libtinfo5*.deb || true
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev python3 git zip rsync libncurses5 || echo "Continuing..."

      - name: 2. 克隆源码 (Lineage-21)
        run: |
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 3. 部署工具链 (Proton Clang)
        run: |
          mkdir -p $(pwd)/toolchain/clang
          wget -q https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz
          tar -xf master.tar.gz -C $(pwd)/toolchain/clang --strip-components=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git --depth=1 $(pwd)/toolchain/gcc64
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git --depth=1 $(pwd)/toolchain/gcc32
          echo "CLANG_PATH=$(pwd)/toolchain/clang/bin" >> $GITHUB_ENV
          echo "GCC64_PATH=$(pwd)/toolchain/gcc64/bin" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/toolchain/gcc32/bin" >> $GITHUB_ENV

      - name: 4. 执行核心编译 (全局物理屏蔽通关版)
        run: |
          cd kernel-source
          export PATH=$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH
          
          # A. 初始化配置
          rm -rf out && mkdir -p out
          make O=out ARCH=arm64 CC=clang sdm845_defconfig
          
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi

          # B. 基础代码修复 (ION, USB)
          sed -i 's/.*ion_import_dma_buf_fd.*/0));/' drivers/char/adsprpc.c
          sed -i 's/.*ion_free(fl->apps->client, map->handle).*/0;/' drivers/char/adsprpc.c
          sed -i 's/int msm_do_bam_disable_enable/static inline int msm_do_bam_disable_enable_old/g' include/linux/usb_bam.h
          sed -i 's/int usb_bam_alloc_fifos/static inline int usb_bam_alloc_fifos_old/g' include/linux/usb_bam.h
          sed -i 's/int usb_bam_free_fifos/static inline int usb_bam_free_fifos_old/g' include/linux/usb_bam.h
          find drivers/staging/android/ion/ -name "*.h" -exec sed -i 's/^int msm_ion_do_cache_offset_op/static inline int msm_ion_do_cache_offset_op/g' {} +

          # C. 【核心修复】全局头文件宏注入
          # 将所有导致链接失败的函数直接重定向，确保 vmlinux 能够生成
          {
            echo ""
            echo "/* Global Fixes by Dola */"
            echo "#define scm_call2(...) 0"
            echo "#define scm_call2_atomic(...) 0"
            echo "#define is_scm_armv8(...) 1"
            echo "#define scm_call_atomic1(...) 0"
            echo "#define apr_get_q6_state(...) 0"
            echo "#define afe_set_routing_callback(...) 0"
            echo "#define cal_utils_match_buf_num(...) 0"
            echo "#define subsystem_get(...) 0"
            echo "#define subsystem_put(...) "
            echo "#define subsystem_notifier_register(...) 0"
            echo "#define subsystem_notifier_unregister(...) 0"
          } >> include/linux/kconfig.h

          # D. 强制补全关键配置
          {
            echo "CONFIG_MSM_SUBSYSTEM_RESTART=y"
            echo "CONFIG_MSM_PIL=y"
            echo "CONFIG_QCOM_SCM=y"
            echo "CONFIG_QCOM_SCM_64=y"
            echo "CONFIG_SND_SOC_QDSP6V2=y"
            echo "CONFIG_MSM_QDSP6_APRV2=y"
            echo "CONFIG_CC_STACKPROTECTOR_STRONG=y"
            echo "CONFIG_IOMMU_DEBUG=n"
            echo "CONFIG_EFI=n"
          } >> out/.config

          yes "" | make O=out ARCH=arm64 CC=clang olddefconfig

          # E. 执行编译
          make -j$(nproc) O=out \
                        ARCH=arm64 \
                        CC=clang \
                        CLANG_TRIPLE=aarch64-linux-gnu- \
                        CROSS_COMPILE=aarch64-linux-android- \
                        CROSS_COMPILE_ARM32=arm-linux-androideabi- \
                        AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
                        TECHPACK_AUDIO=y \
                        KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-int-conversion -Wno-incompatible-pointer-types -I$(pwd)/techpack/audio/include -I$(pwd)/drivers/soc/qcom"

      - name: 5. 打包 AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          find kernel-source/out/arch/arm64/boot/ -name "Image.gz*" -exec cp {} AnyKernel3/ \;
          if [ ! -f AnyKernel3/Image.gz* ]; then
            cp kernel-source/out/arch/arm64/boot/Image AnyKernel3/ || echo "No Image found"
          fi
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=perseus/' anykernel.sh
          sed -i 's/device.name2=toroplus/device.name2=mix3/' anykernel.sh
          zip -r ../Mix3-Kernel-Final.zip *

      - name: 6. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel-Final
          path: Mix3-Kernel-Final.zip
