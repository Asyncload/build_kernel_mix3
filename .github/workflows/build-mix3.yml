name: build_Mix3_kernel
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 初始化与同步
        run: |
          sudo apt-get update && sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev python3 git zip rsync
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_msm8998.git -b lineage-18.1 kernel-source

      - name: 2. 部署编译器 (Google 稳定源)
        run: |
          mkdir -p tc && cd tc
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-11.0.0_r35.tar.gz
          tar -xf android-11.0.0_r35.tar.gz
          echo "PATH=\$PATH:$(pwd)/bin" >> $GITHUB_ENV

      - name: 3. 核心修复与编译
        run: |
          cd kernel-source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          make lineageos_msm8998_defconfig

          # 一键修复所有符号缺失 (注入 stub_fix.c)
          printf '#include <linux/types.h>\n#include <linux/export.h>\n#define STUB(f) int f(void){return 0;} EXPORT_SYMBOL(f)\n' > drivers/soc/qcom/stub_fix.c
          for s in scm_call scm_call2 scm_call2_noretry hyp_assign_phys glink_open glink_tx glink_rx_done \
          msm_bus_scale_client_update_request msm_bus_scale_register_client is_voc_initialized \
          afe_rt_proxy_port_read do_elf_ramdump ion_client_create ion_import_dma_buf_fd \
          spectre_bhb_enable_mitigation spectre_bhb_patch_loop_iter; do
            echo "STUB($s);" >> drivers/soc/qcom/stub_fix.c
          done
          echo "obj-y += stub_fix.o" >> drivers/soc/qcom/Makefile

          # 修复 EFI 和 USB BAM 冲突
          sed -i 's/int usb_bam_alloc_fifos/static inline int __old_usb_bam/g' include/linux/usb_bam.h
          echo "#define usb_bam_alloc_fifos(...) (0)" >> include/linux/usb_bam.h
          echo "CONFIG_EFI=n" >> .config

          # 开始编译
          yes "" | make olddefconfig
          make -j$(nproc)

          # 打包结果
          mkdir -p AnyKernel3
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || cp arch/arm64/boot/Image.gz AnyKernel3/
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp -r ak3/* AnyKernel3/ && cd AnyKernel3
          zip -r ../Mix3-Kernel.zip *

      - name: 4. 上传
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Kernel
          path: kernel-source/Mix3-Kernel.zip
