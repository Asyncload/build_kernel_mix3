name: 给我出内核 (Perseus)
on:
  push:
   branches: [ main ]
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch/tag (default: lineage-21)"
        required: true
        default: "lineage-21"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 1. 安装官方推荐工具链
      - name: Install official toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            aarch64-linux-android-14 \  # 官方指定工具链
            openjdk-11-jdk

      # 2. 检出代码
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sdm845
          ref: ${{ inputs.branch }}
          submodules: recursive

      # 3. 配置编译环境
      - name: Setup environment
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          make O=out sdm845_defconfig

      # 4. 执行编译
      - name: Build kernel
        run: |
          make -j$(nproc) O=out V=1 \
            KBUILD_BUILD_USER=github-actions \
            KBUILD_BUILD_HOST=ubuntu-latest

      # 5. 验证产物
      - name: Verify build
        run: |
          file out/arch/arm64/boot/Image.gz
          make kernelversion | grep "4.9.337"

      # 6. 打包上传
      - name: Create artifacts
        run: |
          mkdir -p artifacts
          tar -czvf artifacts/kernel-${{ inputs.branch }}.tar.gz \
            out/arch/arm64/boot/Image.gz \
            out/System.map

      - name: Upload artifacts (v4)
        uses: actions/upload-artifact@v4
        with:
          name: lineageos-perseus-kernel
          path: artifacts/
          retention-days: 30
