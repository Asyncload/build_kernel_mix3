name: LineageOS Kernel Build for Perseus
on:
  push:
    branches:
      - main

jobs:
  build_kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Initialize
        run: |
          mkdir -p lineageos_build
          cd lineageos_build

      - name: Add Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libreadline-dev libssl-dev libxml2-dev lzop openjdk-11-jdk pngcrush python-is-python3 python3 python3-pip repo rsync schedtool squashfs-tools zip zlib1g-dev
          sudo apt-get install -y lib32ncurses5-dev || sudo apt-get install -y lib32ncursesw5-dev
          wget https://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb && sudo dpkg -i libtinfo5_6.3-2_amd64.deb && rm -f libtinfo5_6.3-2_amd64.deb

      - name: Install Compilation Tools
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          cd arm-linux-androideabi-4.9
          git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458
          export PATH=$PWD/bin:$PATH

      - name: Download Kernel Source
        run: |
          repo init -u https://github.com/LineageOS/android_kernel_xiaomi_perseus -b lineage-21
          repo sync
          cd android_kernel_xiaomi_perseus

      - name: Configure Compilation Environment
        run: |
          wget https://github.com/LineageOS/android_kernel_xiaomi_sdm845/raw/lineage-21/arch/arm64/configs/vendor/xiaomi/lineageos_perseus_defconfig
          mv lineageos_perseus_defconfig.config
          make oldconfig

      - name: Compile
        run: |
          make -j$(nproc)

      - name: Package
        run: |
          make modules_install
          find. -name '*.ko' -exec cp {}../lineageos_build/ \;
          cd..
          tar -czvf kernel_package.tar.gz lineageos_build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lineageos-kernel-package
          path: kernel_package.tar.gz
