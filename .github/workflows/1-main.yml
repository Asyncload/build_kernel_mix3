name: LineageOS Kernel Build for Xiaomi Mix 3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Initialize
        run: |
          mkdir -p build_dir
          cd build_dir

      - name: Add Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libreadline-dev libssl-dev libxml2-dev lzop openjdk-11-jdk pngcrush python-is-python3 python3 python3-pip repo rsync schedtool squashfs-tools zip zlib1g-dev
          sudo apt-get install -y lib32ncurses5-dev || sudo apt-get install -y lib32ncursesw5-dev
          wget https://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2_amd64.deb && sudo dpkg -i libtinfo5_6.3-2_amd64.deb && rm -f libtinfo5_6.3-2_amd64.deb

      - name: Clone Repository
        run: |
          git clone -b lineage-21 https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git
          cd android_kernel_xiaomi_sdm845

      - name: Configure Compilation Environment
        run: |
          rm -rf out && mkdir -p out
          make O=out ARCH=arm64 CC=clang sdm845_defconfig
          if [ -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/xiaomi/perseus.config
          fi

      - name: Compile
        run: |
          make -j$(nproc) O=out ARCH=arm64 CC=clang V=1

      - name: Package
        run: |
          make modules_install O=out
          find. -name '*.ko' -exec cp {} out/ \;
          cd..
          tar -czvf kernel_package.tar.gz build_dir

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lineageos-kernel-package
          path: kernel_package.tar.gz
