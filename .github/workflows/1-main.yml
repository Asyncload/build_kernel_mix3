name: build - mix3 - kernel

on:
  push:
    branches:
      - main

jobs:
  build_kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git libncurses5-dev libssl-dev make python3 wget zip

      - name: Checkout kernel source
        uses: actions/checkout@v2
        with:
          repository: LineageOS/android_kernel_xiaomi_sdm845
          ref: lineage-21
          path: kernel

      # 官方 GCC 5.4.1（最接近 5.3.1 的官方版本）
      - name: Clone AOSP GCC 5.4.1 aarch64
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-5.4.1 gcc_5.4.1

      - name: Set up environment
        run: |
          export PATH=$PWD/gcc_5.4.1/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "CROSS_COMPILE=$CROSS_COMPILE" >> $GITHUB_ENV

      - name: Configure kernel
        run: |
          cd kernel
          make mrproper
          cp arch/arm64/configs/sdm845_defconfig .config
          cat arch/arm64/configs/vendor/xiaomi/perseus.config >> .config
          make olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc)

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mix3-Perseus-Kernel
          path: kernel/arch/arm64/boot/Image.gz
