name: 源码完整性审计

on:
  workflow_dispatch: # 手动触发测试

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 克隆内核源码
        run: |
          # 快速克隆，不带历史记录
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git -b lineage-21 --depth=1 kernel-source

      - name: 2. 核心符号与目录审计
        run: |
          cd kernel-source
          echo "=========================================="
          echo "🔍 1. 检查 Techpack (音频驱动) 是否存在"
          if [ -d "techpack/audio" ]; then
            echo "✅ techpack/audio 目录存在"
            ls -F techpack/audio | head -n 5
          else
            echo "❌ 警告: techpack/audio 缺失！(sdm845 编译必断)"
          fi

          echo -e "\n🔍 2. 检查缺失符号 afe_start_pseudo_port"
          # 查找定义（通常在 .c 文件中）
          grep -r "afe_start_pseudo_port" . --include="*.c" --include="*.h" | head -n 5 || echo "❌ 全局未找到该符号的定义代码"

          echo -e "\n🔍 3. 检查小米滑盖符号 elliptic_set_hall_state"
          grep -r "elliptic_set_hall_state" . | head -n 10 || echo "❌ 全局未找到该符号的定义代码"

          echo -e "\n🔍 4. 检查超声波模块 (Elliptic) 目录"
          if [ -d "techpack/audio/asoc/elliptic" ]; then
            echo "✅ Elliptic 目录存在"
          else
            echo "❌ Elliptic 目录缺失"
          fi

          echo -e "\n🔍 5. 检查 EFI Stub 符号 (确认是否需要 CONFIG_EFI)"
          grep -r "__efistub_strrchr" . || echo "ℹ️ 未找到 EFI 符号定义 (若关掉 CONFIG_EFI 则无影响)"
          echo "=========================================="

      - name: 3. 模拟配置审计 (Check Defconfig)
        run: |
          cd kernel-source
          echo "🔍 检查默认配置中的相关开关:"
          grep -E "CONFIG_SND_SOC_SDM845|CONFIG_SND_SOC_PERSEUS|CONFIG_SND_SOC_ELLIPTIC" arch/arm64/configs/sdm845_defconfig || echo "ℹ️ 默认配置中未发现相关宏"
