name: Compile Kernel
on:
  workflow_call:  # 供主工作流调用

jobs:
  build:
    runs-on: ubuntu-latest
    needs: [setup, patch]  # 依赖环境准备和补丁
    steps:
      - name: Restore code cache  # 恢复代码缓存（加速编译）
        uses: actions/cache@v3
        with:
          path: .
          key: ${{ runner.os }}-code-${{ github.sha }}

      - name: Validate config files  # 检查配置文件完整性
        run: |
          if [ ! -f arch/arm64/configs/sdm845_defconfig ]; then
            echo "❌ 基础配置缺失"
            exit 1
          fi
          if [ ! -f arch/arm64/configs/vendor/xiaomi/perseus.config ]; then
            echo "❌ 设备配置缺失"
            exit 1
          fi

      - name: Prepare kernel configuration  # 生成并合并配置
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          make O=out olddefconfig  # 初始化基础配置
          cat arch/arm64/configs/vendor/xiaomi/perseus.config >> out/.config  # 合并设备配置
          yes "" | make -C out oldconfig  # 静默处理配置冲突

      - name: Compile kernel  # 核心编译命令
        run: |
          make -j$(expr $(nproc) - 2) O=out V=1  # 留2核心给系统
        env:
          KBUILD_BUILD_USER: "github-actions"
          KBUILD_BUILD_HOST: "ubuntu-latest"

      - name: Cache kernel artifact  # 缓存编译产物
        uses: actions/cache@v3
        with:
          path: out/arch/arm64/boot
          key: ${{ runner.os }}-kernel-${{ github.sha }}