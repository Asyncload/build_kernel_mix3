name: Apply Patches
on:
  workflow_call:  # 供主工作流调用

jobs:
  patch:
    runs-on: ubuntu-latest
    needs: setup  # 依赖环境准备完成
    steps:
      - name: Check for patches directory  # 检查补丁目录是否存在
        run: |
          if [ ! -d patches ]; then
            echo "❌ 补丁目录不存在，跳过打补丁"
            exit 0
          fi

      - name: Apply patches  # 应用所有补丁文件
        run: |
          for patch in patches/*.patch; do
            echo "Applying $patch..."
            git apply --check "$patch" || exit 1  # 先检查补丁兼容性
            git apply "$patch"
          done
        env:
          GIT_AUTHOR_NAME: "GitHub Actions"
          GIT_AUTHOR_EMAIL: "actions@github.com"

      - name: Commit changes  # 提交补丁修改
        run: |
          git diff --exit-code || (git add . && git commit -m "Apply patches")