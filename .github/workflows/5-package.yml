name: Package Artifact
on:
  workflow_call:  # 供主工作流调用

jobs:
  package:
    runs-on: ubuntu-latest
    needs: build  # 必须等待编译完成
    steps:
      - name: Create output directory  # 创建打包目录
        run: |
          mkdir -p artifacts/${{ github.sha }}

      - name: Compress kernel image  # 压缩内核镜像
        run: |
          tar -czvf artifacts/${{ github.sha }}/kernel-${{ needs.build.outputs.kernel-branch }}.tar.gz \
            out/arch/arm64/boot/Image.gz \
            out/System.map

      - name: Upload artifact to GitHub  # 上传制品到GitHub
        uses: actions/upload-artifact@v3
        with:
          name: kernel-${{ needs.build.outputs.kernel-branch }}
          path: artifacts/${{ github.sha }}

      - name: Cleanup temporary files  # 清理临时文件
        run: |
          rm -rf out